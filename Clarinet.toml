[project]
name = "quick-twap-accumulator"
authors = ["TWAP Developer Team"]
description = "A Time-Weighted Average Price (TWAP) accumulator for decentralized finance applications on Stacks"
telemetry = false
requirements = []
[contracts.twap-accumulator]
path = "contracts/twap-accumulator.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
